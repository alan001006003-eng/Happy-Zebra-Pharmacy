<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快樂斑馬藥局 - 叫號系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* 您指定的卡其/大地色背景 */
            background-color: #bda688;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none; 
            padding: 10px;
            box-sizing: border-box;
        }

        .app-container {
            display: grid;
            grid-template-columns: auto 1fr auto;
            /* 移除多餘的 row，現在只需要一行 */
            gap: clamp(15px, 3vw, 40px);
            align-items: center;
            justify-items: center;
            width: 100%;
            max-width: 1000px;
        }

        .grid-minus { grid-column: 1; grid-row: 1; }
        .grid-card { grid-column: 2; grid-row: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid-plus { grid-column: 3; grid-row: 1; }

        .main-card {
            width: 100%;
            max-width: 600px;
            background-color: #3e2723;
            border-radius: clamp(20px, 4vw, 40px);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        /* 標題區塊 */
        .header-area {
            background-color: #e5f1e1;
            padding: clamp(15px, 3vh, 25px) 0;
            color: #386641;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 900;
            letter-spacing: 4px;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(15px, 3vw, 25px);
        }

        /* 針對斑馬 Logo：加入可點擊的動畫與鼠標提示 */
        .header-logo {
            height: clamp(80px, 12vw, 130px);
            width: auto;
            object-fit: contain;
            background-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
            cursor: pointer; /* 讓鼠標變成手指 */
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s;
        }
        
        /* 懸停時斑馬會微微放大傾斜，提示這是一個按鈕 */
        .header-logo:hover {
            transform: scale(1.1) rotate(-5deg);
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
        }
        .header-logo:active {
            transform: scale(0.95);
        }

        .number-container {
            height: clamp(150px, 35vh, 260px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .number-area {
            color: white;
            font-size: clamp(120px, 20vw, 200px);
            font-family: 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 600; 
            letter-spacing: -1px;
            line-height: 1;
            text-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-variant-numeric: tabular-nums;
        }

        .slide-up-in {
            animation: slideUpIn 0.4s ease-out forwards;
        }
        @keyframes slideUpIn {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* 叫號呼吸光暈特效 */
        .calling-glow {
            animation: callingGlow 1.5s ease-in-out infinite alternate;
        }
        @keyframes callingGlow {
            0% { 
                transform: scale(1); 
                text-shadow: 0 0 15px rgba(212, 175, 55, 0.2); 
            }
            100% { 
                transform: scale(1.05); 
                text-shadow: 0 0 40px rgba(212, 175, 55, 0.8), 0 0 80px rgba(212, 175, 55, 0.4); 
                color: #fffde7;
            }
        }

        .footer-area {
            background-color: #d7ccc8;
            padding: clamp(10px, 2vh, 15px) clamp(5px, 2vw, 15px);
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: bold;
            color: #333;
            border-top: 2px solid rgba(0,0,0,0.1);
        }

        .btn-side {
            width: clamp(80px, 12vw, 140px);
            height: clamp(200px, 45vh, 400px);
            background-color: #3e2723;
            border-radius: clamp(20px, 4vw, 40px);
            color: white;
            font-size: clamp(50px, 8vw, 80px); 
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        .btn-side:hover { filter: brightness(1.15); }
        .btn-side:active {
            transform: translateY(5px) scale(0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-minus { border-bottom: clamp(6px, 1.5vh, 12px) solid #e57373; }
        .btn-plus { border-bottom: clamp(6px, 1.5vh, 12px) solid #81c784; }

        .highlight-orange { color: #f4511e; }
        .highlight-green { color: #2e7d32; }

        /* 手機直放模式優化：由於移除了歸零按鈕，讓加減號各佔 50% 寬度，完美貼齊 */
        @media (orientation: portrait) {
            .app-container {
                grid-template-columns: 1fr 1fr; /* 變成兩欄 */
                gap: 15px;
                max-width: 600px;
            }
            .grid-card { grid-column: 1 / 3; grid-row: 1; }
            .grid-minus { grid-column: 1; grid-row: 2; }
            .grid-plus { grid-column: 2; grid-row: 2; }

            .btn-side {
                width: 100%;
                height: clamp(80px, 12vh, 120px);
                border-radius: 20px;
                font-size: clamp(40px, 10vw, 60px);
                border-bottom-width: 8px;
            }

            .header-logo {
                height: clamp(110px, 28vw, 160px); 
            }
            .header-area {
                font-size: clamp(26px, 7vw, 40px); 
                gap: 12px;
                padding: 15px 10px;
            }
        }

        /* 橫放扁平螢幕優化 */
        @media (orientation: landscape) and (max-height: 500px) {
            .header-area { font-size: clamp(20px, 6vh, 32px); padding: 10px 0; }
            .number-container { height: clamp(100px, 45vh, 150px); }
            .number-area { font-size: clamp(80px, 40vh, 120px); }
            .footer-area { font-size: clamp(12px, 3.5vh, 16px); padding: 8px; }
            .btn-side { height: clamp(150px, 70vh, 250px); border-bottom-width: 6px; }
            .header-logo { height: clamp(50px, 10vh, 80px); } 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 減少按鈕 -->
        <div class="grid-minus btn-side btn-minus" onclick="changeNumber(-1)">
            -
        </div>

        <!-- 主顯示區 -->
        <div class="grid-card">
            <div class="main-card">
                <div class="header-area">
                    <!-- Logo 區塊：加上點擊事件 (onclick) 與懸浮提示 (title) -->
                    <img src="logo.png" alt="Logo" class="header-logo" title="點擊斑馬歸零" onclick="confirmReset()" onerror="this.style.display='none'">
                    <span>目前領藥號</span>
                </div>
                <div class="number-container" onclick="speakNumber()">
                    <div id="numberDisplay" class="number-area">0</div>
                </div>
                <div class="footer-area">
                    領藥號<span class="highlight-orange">到號</span>或<span class="highlight-orange">過號</span>後，請<span class="highlight-green">依序排隊</span>領藥
                </div>
            </div>
            
            <!-- 懸停顯示的快捷鍵提示（文字同步更新） -->
            <div class="mt-6 text-[#7a6452] text-sm font-bold tracking-widest hidden md:block drop-shadow-sm relative group cursor-help w-full max-w-[400px]">
                <div class="opacity-70 group-hover:opacity-0 transition-opacity duration-300 absolute w-full text-center pointer-events-none">
                    <i class="fa-regular fa-keyboard mr-1"></i> 將滑鼠移至此處查看快捷鍵
                </div>
                <div class="opacity-0 group-hover:opacity-100 transition-opacity duration-300 text-center">
                    [→] 加一號 / [←] 減一號 / [空白鍵] 再次叫號 / 點擊斑馬或 [Del] 歸零
                </div>
            </div>
        </div>

        <!-- 增加按鈕 -->
        <div class="grid-plus btn-side btn-plus" onclick="changeNumber(1)">
            +
        </div>
    </div>

    <script>
        let currentNumber = parseInt(localStorage.getItem('happyZebraBasicNumber')) || 0;
        let isCalling = false;

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('numberDisplay').innerText = currentNumber;
        });

        function changeNumber(delta) {
            currentNumber = Math.max(0, currentNumber + delta);
            localStorage.setItem('happyZebraBasicNumber', currentNumber);
            updateUI();
            
            if (delta > 0) {
                speakNumber();
            }
        }

        // 新增防呆歸零確認函數
        function confirmReset() {
            // 如果已經是 0，就不需要跳出視窗詢問
            if (currentNumber === 0) return;
            
            // 跳出系統原生確認框
            if (confirm("確定要將目前的領藥號碼歸零嗎？")) {
                resetNumber();
            }
        }

        function resetNumber() {
            currentNumber = 0;
            localStorage.setItem('happyZebraBasicNumber', currentNumber);
            updateUI();
        }

        function updateUI() {
            const display = document.getElementById('numberDisplay');
            display.classList.remove('slide-up-in');
            void display.offsetWidth; // 強制重繪
            
            display.innerText = currentNumber;
            display.classList.add('slide-up-in');
        }

        function speakNumber() {
            if (isCalling) return;
            isCalling = true;

            const display = document.getElementById('numberDisplay');
            display.classList.add('calling-glow');

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(`請 ${currentNumber} 號到櫃檯領藥`);
                msg.lang = 'zh-TW';
                msg.rate = 0.95;
                
                msg.onend = () => {
                    setTimeout(() => {
                        display.classList.remove('calling-glow');
                        isCalling = false;
                    }, 800);
                };
                
                window.speechSynthesis.speak(msg);
            } else {
                setTimeout(() => {
                    display.classList.remove('calling-glow');
                    isCalling = false;
                }, 2500);
            }
        }

        // 鍵盤操作支援
        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;

            switch(e.key) {
                case 'ArrowRight':
                case '+':
                    changeNumber(1);
                    break;
                case 'ArrowLeft':
                case '-':
                    changeNumber(-1);
                    break;
                case ' ':
                case 'Enter':
                    e.preventDefault(); 
                    speakNumber();
                    break;
                case 'Backspace':
                case 'Delete':
                    // 使用防呆的 confirmReset 取代直接歸零
                    confirmReset();
                    break;
            }
        });
    </script>
</body>
</html>
