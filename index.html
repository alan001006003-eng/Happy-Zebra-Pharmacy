<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快樂斑馬藥局 - 叫號系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* 您指定的卡其/大地色背景 */
            background-color: #bda688;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none; 
            padding: 10px;
            box-sizing: border-box;
        }

        .app-container {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: clamp(15px, 3vw, 40px);
            align-items: center;
            justify-items: center;
            width: 100%;
            max-width: 1000px;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .grid-minus { grid-column: 1; grid-row: 1; }
        .grid-card { grid-column: 2; grid-row: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid-plus { grid-column: 3; grid-row: 1; }

        .main-card {
            width: 100%;
            max-width: 600px;
            background-color: #3e2723;
            border-radius: clamp(20px, 4vw, 40px);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        /* 標題區塊：Logo 移走後，文字完美置中 */
        .header-area {
            background-color: #e5f1e1;
            padding: clamp(15px, 3vh, 25px) 0;
            color: #386641;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 900;
            letter-spacing: 4px;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 移至左下角的斑馬 Logo 專屬設定 */
        .corner-logo {
            position: fixed;
            bottom: clamp(15px, 4vh, 30px);
            left: clamp(15px, 4vw, 30px);
            height: clamp(90px, 18vh, 160px); /* 放大並適應螢幕 */
            width: auto;
            object-fit: contain;
            background-color: transparent;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
            cursor: pointer; 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s;
            -webkit-tap-highlight-color: transparent;
            z-index: 100; /* 確保浮在最上層 */
        }
        
        .corner-logo:hover {
            transform: scale(1.1) rotate(-5deg);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }
        .corner-logo:active {
            transform: scale(0.95);
        }

        .number-container {
            height: clamp(150px, 35vh, 260px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .number-area {
            color: white;
            font-size: clamp(120px, 20vw, 200px);
            font-family: 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 600; 
            letter-spacing: -1px;
            line-height: 1;
            text-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-variant-numeric: tabular-nums;
        }

        .slide-up-in {
            animation: slideUpIn 0.4s ease-out forwards;
        }
        @keyframes slideUpIn {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .calling-glow {
            animation: callingGlow 1.5s ease-in-out infinite alternate;
        }
        @keyframes callingGlow {
            0% { 
                transform: scale(1); 
                text-shadow: 0 0 15px rgba(212, 175, 55, 0.2); 
            }
            100% { 
                transform: scale(1.05); 
                text-shadow: 0 0 40px rgba(212, 175, 55, 0.8), 0 0 80px rgba(212, 175, 55, 0.4); 
                color: #fffde7;
            }
        }

        .footer-area {
            background-color: #d7ccc8;
            padding: clamp(10px, 2vh, 15px) clamp(5px, 2vw, 15px);
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: bold;
            color: #333;
            border-top: 2px solid rgba(0,0,0,0.1);
        }

        .btn-side {
            width: clamp(80px, 12vw, 140px);
            height: clamp(200px, 45vh, 400px);
            background-color: #3e2723;
            border-radius: clamp(20px, 4vw, 40px);
            color: white;
            font-size: clamp(50px, 8vw, 80px); 
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .btn-side:hover { filter: brightness(1.15); }
        .btn-side:active {
            transform: translateY(5px) scale(0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-minus { border-bottom: clamp(6px, 1.5vh, 12px) solid #e57373; }
        .btn-plus { border-bottom: clamp(6px, 1.5vh, 12px) solid #81c784; }

        /* 水波紋動畫特效 */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(3);
                opacity: 0;
            }
        }

        .highlight-orange { color: #f4511e; }
        .highlight-green { color: #2e7d32; }

        /* 自訂防呆彈窗樣式 */
        #customModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #3e2723;
            border: 4px solid #bda688;
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-btn {
            padding: 14px 0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 47%;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-cancel { background-color: #5d4037; color: white; }
        .btn-cancel:active { background-color: #4a332c; transform: scale(0.95); }
        .btn-confirm { background-color: #e57373; color: white; box-shadow: 0 4px 10px rgba(229, 115, 115, 0.3); }
        .btn-confirm:active { background-color: #ef5350; transform: scale(0.95); box-shadow: none; }

        /* 手機直放模式優化 */
        @media (orientation: portrait) {
            .app-container {
                grid-template-columns: 1fr 1fr; 
                gap: 15px;
                max-width: 600px;
            }
            .grid-card { grid-column: 1 / 3; grid-row: 1; }
            .grid-minus { grid-column: 1; grid-row: 2; }
            .grid-plus { grid-column: 2; grid-row: 2; }

            .btn-side {
                width: 100%;
                height: clamp(80px, 12vh, 120px);
                border-radius: 20px;
                font-size: clamp(40px, 10vw, 60px);
                border-bottom-width: 8px;
            }

            .btn-side:active {
                transform: translateY(4px) scale(0.97); 
                border-bottom-width: 4px; 
                box-shadow: inset 0 3px 6px rgba(0,0,0,0.2), 0 2px 5px rgba(0,0,0,0.3);
                filter: brightness(0.9);
            }

            .header-area {
                font-size: clamp(26px, 7vw, 40px); 
                padding: 15px 10px;
            }

            /* 手機直立時的左下角 Logo 大小控制 */
            .corner-logo {
                height: clamp(80px, 22vw, 130px);
                bottom: clamp(10px, 2vh, 20px);
                left: clamp(10px, 2vw, 20px);
            }
        }

        /* 橫放扁平螢幕優化 */
        @media (orientation: landscape) and (max-height: 500px) {
            .app-container {
                transform: translateY(-5vh);
            }
            .header-area { font-size: clamp(24px, 7vh, 36px); padding: 8px 0; }
            .number-container { height: clamp(90px, 40vh, 140px); }
            .number-area { font-size: clamp(80px, 40vh, 120px); }
            .footer-area { font-size: clamp(12px, 3.5vh, 16px); padding: 6px; }
            .btn-side { height: clamp(150px, 70vh, 250px); border-bottom-width: 6px; }
            
            /* 橫放模式的左下角 Logo 大小控制，避免擋到減號太多 */
            .corner-logo { 
                height: clamp(60px, 18vh, 100px); 
                bottom: 10px;
                left: 10px;
            } 
        }
    </style>
</head>
<body>

    <!-- 獨立於排版之外的左下角斑馬 Logo (懸浮按鈕) -->
    <img src="logo.png" alt="Logo" class="corner-logo" title="點擊斑馬歸零" onclick="showResetModal()" onerror="this.style.display='none'">

    <div class="app-container">
        <!-- 減少按鈕 -->
        <div class="grid-minus btn-side btn-minus" onclick="changeNumber(-1)">
            -
        </div>

        <!-- 主顯示區 -->
        <div class="grid-card">
            <div class="main-card">
                <div class="header-area">
                    <span>目前領藥號</span>
                </div>
                <div class="number-container" onclick="speakNumber()">
                    <div id="numberDisplay" class="number-area">0</div>
                </div>
                <div class="footer-area">
                    領藥號<span class="highlight-orange">到號</span>或<span class="highlight-orange">過號</span>後，請<span class="highlight-green">依序排隊</span>領藥
                </div>
            </div>
            
            <!-- 懸停顯示的快捷鍵提示 -->
            <div class="mt-6 text-[#7a6452] text-sm font-bold tracking-widest hidden md:block drop-shadow-sm relative group cursor-help w-full max-w-[400px]">
                <div class="opacity-70 group-hover:opacity-0 transition-opacity duration-300 absolute w-full text-center pointer-events-none">
                    <i class="fa-regular fa-keyboard mr-1"></i> 將滑鼠移至此處查看快捷鍵
                </div>
                <div class="opacity-0 group-hover:opacity-100 transition-opacity duration-300 text-center">
                    [→] 加一號 / [←] 減一號 / [空白鍵] 再次叫號 / 點擊斑馬或 [Del] 歸零
                </div>
            </div>
        </div>

        <!-- 增加按鈕 -->
        <div class="grid-plus btn-side btn-plus" onclick="changeNumber(1)">
            +
        </div>
    </div>

    <!-- 自訂的防呆歸零彈窗 -->
    <div id="customModal">
        <div class="modal-content">
            <h3 class="text-2xl font-bold text-white mb-3 tracking-widest">確定要歸零嗎？</h3>
            <p class="text-[#d7ccc8] mb-8 font-bold">這將會清除目前的叫號進度，<br>重新從 0 開始。</p>
            <div style="display: flex; justify-content: space-between; gap: 10px;">
                <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn btn-confirm" onclick="executeReset()">確定歸零</button>
            </div>
        </div>
    </div>

    <script>
        let currentNumber = parseInt(localStorage.getItem('happyZebraBasicNumber')) || 0;
        let isCalling = false;

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('numberDisplay').innerText = currentNumber;
            setupRippleEffects(); 
        });

        function changeNumber(delta) {
            currentNumber = Math.max(0, currentNumber + delta);
            localStorage.setItem('happyZebraBasicNumber', currentNumber);
            updateUI();
            
            if (delta > 0) {
                speakNumber();
            }
        }

        // --- 質感按鈕：水波紋與微震動特效 ---
        function setupRippleEffects() {
            document.querySelectorAll('.btn-side').forEach(btn => {
                btn.addEventListener('pointerdown', function(e) {
                    const button = e.currentTarget;
                    
                    if (navigator.vibrate) {
                        navigator.vibrate(15);
                    }

                    const circle = document.createElement("span");
                    const diameter = Math.max(button.clientWidth, button.clientHeight);
                    const radius = diameter / 2;

                    const rect = button.getBoundingClientRect();
                    
                    circle.style.width = circle.style.height = `${diameter}px`;
                    circle.style.left = `${e.clientX - rect.left - radius}px`;
                    circle.style.top = `${e.clientY - rect.top - radius}px`;
                    circle.classList.add("ripple-effect");

                    const existingRipple = button.querySelector('.ripple-effect');
                    if (existingRipple) {
                        existingRipple.remove();
                    }

                    button.appendChild(circle);

                    setTimeout(() => circle.remove(), 600);
                });
            });
        }
        // ------------------------------------

        // --- 自訂彈窗控制邏輯 ---
        function showResetModal() {
            if (currentNumber === 0) return; 
            document.getElementById('customModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('customModal').style.display = 'none';
        }

        function executeReset() {
            closeModal();
            resetNumber();
        }
        // ------------------------

        function resetNumber() {
            currentNumber = 0;
            localStorage.setItem('happyZebraBasicNumber', currentNumber);
            updateUI();
        }

        function updateUI() {
            const display = document.getElementById('numberDisplay');
            display.classList.remove('slide-up-in');
            void display.offsetWidth; 
            
            display.innerText = currentNumber;
            display.classList.add('slide-up-in');
        }

        function speakNumber() {
            if (isCalling) return;
            isCalling = true;

            const display = document.getElementById('numberDisplay');
            display.classList.add('calling-glow');

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(`請 ${currentNumber} 號到櫃檯領藥`);
                msg.lang = 'zh-TW';
                msg.rate = 0.95;
                
                msg.onend = () => {
                    setTimeout(() => {
                        display.classList.remove('calling-glow');
                        isCalling = false;
                    }, 800);
                };
                
                window.speechSynthesis.speak(msg);
            } else {
                setTimeout(() => {
                    display.classList.remove('calling-glow');
                    isCalling = false;
                }, 2500);
            }
        }

        // 鍵盤操作支援
        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            
            if (document.getElementById('customModal').style.display === 'flex') {
                if (e.key === 'Enter') executeReset();
                if (e.key === 'Escape') closeModal();
                return;
            }

            switch(e.key) {
                case 'ArrowRight':
                case '+':
                    changeNumber(1);
                    break;
                case 'ArrowLeft':
                case '-':
                    changeNumber(-1);
                    break;
                case ' ':
                case 'Enter':
                    e.preventDefault(); 
                    speakNumber();
                    break;
                case 'Backspace':
                case 'Delete':
                    showResetModal();
                    break;
            }
        });
    </script>
</body>
</html>
